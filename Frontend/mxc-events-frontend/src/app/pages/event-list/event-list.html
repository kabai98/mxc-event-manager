<div class="container">
  <!-- Fejléc és Új esemény gomb -->
  <div class="header-section">
    <h1>Events</h1>
    <button mat-flat-button color="primary" class="add-btn" (click)="onAddEvent()">
      Add new event
    </button>
  </div>

  <!-- Material Táblázat -->
  <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z0 event-table">
    <!-- Name Oszlop -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>NAME</th>
      <td mat-cell *matCellDef="let element">{{ element.name }}</td>
    </ng-container>

    <!-- Place Oszlop -->
    <ng-container matColumnDef="place">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>PLACE</th>
      <td mat-cell *matCellDef="let element">
        {{ element.city }}, <span class="country-text">{{ element.country }}</span>
      </td>
    </ng-container>

    <!-- Capacity Oszlop -->
    <ng-container matColumnDef="capacity">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>CAPACITY</th>
      <td mat-cell *matCellDef="let element">{{ element.capacity }} ppl</td>
    </ng-container>

    <!-- Actions Oszlop -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>ACTIONS</th>
      <td mat-cell *matCellDef="let element">
        <div class="action-buttons">
          <button mat-button class="edit-btn" (click)="onEdit(element)">
            <mat-icon>edit</mat-icon> Edit
          </button>
          <button mat-button class="delete-btn" (click)="onDelete(element)">
            <mat-icon>delete</mat-icon> Delete
          </button>
        </div>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>
