<div class="edit-wrapper">
  <h1>Edit event</h1>

  <form [formGroup]="eventForm" (ngSubmit)="onSave()">
    <div class="form-group">
      <label>Name</label>
      <mat-form-field appearance="outline">
        <input matInput formControlName="name" />
      </mat-form-field>
    </div>

    <h3 class="section-title">PLACE</h3>

    <div class="form-group">
      <label>City</label>
      <mat-form-field appearance="outline">
        <input matInput formControlName="city" />
      </mat-form-field>
    </div>

    <div class="form-group">
      <label>Country</label>
      <mat-form-field appearance="outline">
        <input matInput formControlName="country" />
      </mat-form-field>
    </div>

    <div class="form-group capacity-field">
      <label>Capacity</label>
      <mat-form-field appearance="outline">
        <input matInput formControlName="capacity" type="text" />
      </mat-form-field>
    </div>

    <div class="button-row">
      <button type="button" mat-button (click)="onCancel()" class="cancel-btn">Cancel</button>
      <button
        type="submit"
        mat-flat-button
        color="primary"
        class="save-btn"
        [disabled]="eventForm.invalid"
      >
        Save
      </button>
    </div>
  </form>
</div>
